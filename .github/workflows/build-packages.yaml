name: Build Packages

on:
  workflow_dispatch:
  push:
    branches: [ "lite" ]

jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build images
        run: |
          ./build.sh update
      - name: Test generating user license
        run: |
          ./licenseGen.sh user TestName TestEmail@example.com 4a619d4a-522d-4c70-8596-affb5b607c23
      - name: Test generating organization license
        run: |
          ./licenseGen.sh org TestName TestEmail@example.com 4a619d4a-522d-4c70-8596-affb5b607c23
      - name: Push images
        run: |
          VERSION=$(curl -s https://api.github.com/repos/bitwarden/self-host/releases/latest | jq -r '.tag_name')
          DATE=$(date +%Y-%m-%d)
          docker tag bitwarden-patched:latest ghcr.io/jgigantino31/bitwarden-patched:latest
          docker tag bitwarden-patched:latest ghcr.io/jgigantino31/bitwarden-patched:$VERSION
          docker tag bitwarden-patched:latest ghcr.io/jgigantino31/bitwarden-patched:$DATE
          docker tag bitbetter/licensegen:latest ghcr.io/jgigantino31/licensegen:latest
          docker tag bitbetter/licensegen:latest ghcr.io/jgigantino31/licensegen:$VERSION
          docker tag bitbetter/licensegen:latest ghcr.io/jgigantino31/licensegen:$DATE
          docker push ghcr.io/jgigantino31/bitwarden-patched:latest
          docker push ghcr.io/jgigantino31/bitwarden-patched:$VERSION
          docker push ghcr.io/jgigantino31/bitwarden-patched:$DATE
          docker push ghcr.io/jgigantino31/licensegen:latest
          docker push ghcr.io/jgigantino31/licensegen:$VERSION
          docker push ghcr.io/jgigantino31/licensegen:$DATE
